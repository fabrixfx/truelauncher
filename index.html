<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rwbox repo</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --m3-surface: #F7F9FC;
            --m3-primary: #0061A4;
            --m3-on-primary: #ffffff;
            --m3-container: #D1E4FF;
            --m3-on-container: #001D36;
            --m3-outline: #74777F;
            --m3-card: #FFFFFF;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--m3-surface);
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            margin-bottom: 32px;
        }

        h1 {
            font-family: 'Google Sans', sans-serif;
            color: var(--m3-on-container);
            font-size: 2rem;
            margin: 0;
        }

        .section-label {
            font-family: 'Google Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--m3-primary);
            margin: 24px 0 12px 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--m3-card);
            border-radius: 28px;
            padding: 8px;
            width: 100%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid var(--m3-container);
            margin-bottom: 16px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--m3-on-container);
            transition: background 0.2s ease;
        }

        .item:hover {
            background: var(--m3-container);
        }

        .icon-box {
            background: var(--m3-container);
            color: var(--m3-primary);
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
        }

        .info {
            flex-grow: 1;
        }

        .info b {
            display: block;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .info span {
            font-size: 0.85rem;
            color: var(--m3-outline);
        }

        .download-btn {
            color: var(--m3-primary);
            margin-left: 8px;
        }

        .loader {
            padding: 24px;
            text-align: center;
            color: var(--m3-outline);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>rwbox</h1>
            <p style="color: var(--m3-outline); margin: 4px 0 0 0;"></p>
        </div>

        <div class="section-label">Основные файлы</div>
        <div class="card" id="main-files">
            <div class="loader">Синхронизация...</div>
        </div>

        <div class="section-label">Дополнительное ПО</div>
        <div class="card" id="tool-files">
            <div class="loader">Синхронизация...</div>
        </div>
    </div>

    <script>
        const USER = 'fabrixfx';
        const REPO = 'truelauncher';

        async function fetchFolder(folderName, elementId) {
            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/builds/${folderName}`;
            const container = document.getElementById(elementId);

            try {
                const response = await fetch(url);
                const items = await response.json();

                if (!Array.isArray(items) || items.length === 0) {
                    container.innerHTML = '<div class="loader">Файлы отсутствуют</div>';
                    return;
                }

                container.innerHTML = '';
                items.forEach(file => {
                    if (file.type === 'file') {
                        const size = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
                        const isApk = file.name.toLowerCase().endsWith('.apk');
                        const icon = isApk ? 'android' : 'inventory_2';

                        container.innerHTML += `
                            <a href="${file.download_url}" class="item">
                                <div class="icon-box">
                                    <span class="material-icons-outlined">${icon}</span>
                                </div>
                                <div class="info">
                                    <b>${file.name}</b>
                                    <span>${size}</span>
                                </div>
                                <span class="material-icons-outlined download-btn">file_download</span>
                            </a>
                        `;
                    }
                });
            } catch (e) {
                container.innerHTML = '<div class="loader">Ошибка подключения к GitHub</div>';
            }
        }

        fetchFolder('main', 'main-files');
        fetchFolder('tools', 'tool-files');
    </script>

</body>
</html>
